            rel="stylesheet"
        />
    </head>
    <body>
        <!-- Navigation -->
        <nav class="navbar scrolled" id="navbar">
            <div class="container">
                <div class="nav-content">
                    <div class="logo-section">
                        <a
                            href="index.html"
                            class="logo-link"
                            aria-label="SHRESTHA DIAMONDS - Home"
                        >
                            <img
                                src="assets/images/logo.png"
                                alt="SHRESTHA DIAMONDS"
                                class="nav-logo"
                            />
                        </a>
                    </div>
                    <button class="mobile-menu-toggle" aria-label="Toggle menu">
                        <span></span>
                        <span></span>
                        <span></span>
                    </button>
                    <ul class="nav-menu">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="our-story.html">Our Story</a></li>
                        <li><a href="our-products.html">Our Products</a></li>
                        <li>
                            <a href="contact.html" class="active">Contact Us</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Contact Section -->
        <section class="contact-section">
            <div class="container">
                <h2 class="page-title">Contact Us</h2>

                <div class="contact-content">
                    <form id="contactForm" class="contact-form">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input
                                type="text"
                                id="name"
                                name="name"
                                class="form-control"
                                required
                            />
                        </div>

                        <div class="form-group">
                            <label for="sector">Sector</label>
                            <select
                                id="sector"
                                name="sector"
                                class="form-control"
                                required
                            >
                                <option value="">Select Sector</option>
                                <option value="jeweller">Jeweller</option>
                                <option value="manufacture">Manufacture</option>
                                <option value="wholesaler">Wholesaler</option>
                                <option value="designer">Designer</option>
                                <option value="trader">Trader</option>
                                <option value="individual">Individual</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="country">Country</label>
                            <select
                                id="country"
                                name="country"
                                class="form-control"
                                required
                            >
                                <option value="">Select Country</option>
                                <option value="india">India</option>
                                <option value="nepal">Nepal</option>
                                <option value="usa">United States</option>
                                <option value="uk">United Kingdom</option>
                                <option value="canada">Canada</option>
                                <option value="australia">Australia</option>
                                <option value="uae">
                                    United Arab Emirates
                                </option>
                                <option value="singapore">Singapore</option>
                                <option value="hong-kong">Hong Kong</option>
                                <option value="other">Other</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="mobile"
                                >Mobile (Country code enabled)</label
                            >
                            <div class="mobile-input-group">
                                <select
                                    id="countryCode"
                                    name="countryCode"
                                    class="country-code-select"
                                >
                                    <option value="+91">+91 (India)</option>
                                    <option value="+977">+977 (Nepal)</option>
                                    <option value="+1">+1 (USA/Canada)</option>
                                    <option value="+44">+44 (UK)</option>
                                    <option value="+61">+61 (Australia)</option>
                                    <option value="+971">+971 (UAE)</option>
                                    <option value="+65">+65 (Singapore)</option>
                                    <option value="+852">
                                        +852 (Hong Kong)
                                    </option>
                                </select>
                                <input
                                    type="tel"
                                    id="mobile"
                                    name="mobile"
                                    class="form-control mobile-input"
                                    placeholder="Enter mobile number"
                                    required
                                />
                            </div>
                        </div>

                        <button
                            type="submit"
                            class="btn-submit btn-whatsapp-contact"
                        >
                            <span>📱</span> Direct WhatsApp Reach Out
                        </button>
                    </form>

                    <!-- Email Section -->
                    <div class="email-section">
                        <h3 class="section-subtitle">Write us</h3>
                        <div class="email-links">
                            <a href="mailto:trade@omka.co.in" class="email-link"
                                >trade@omka.co.in</a
                            >
                            <a
                                href="mailto:diamond@myshrestha.com"
                                class="email-link"
                                >diamond@myshrestha.com</a
                            >
                        </div>
                    </div>

                    <!-- Phone Section -->
                    <div class="phone-section">
                        <h3 class="section-subtitle">Book your trade</h3>
                        <div class="phone-links">
                            <a
                                href="https://wa.me/918904611111?text=Hello%20SHRESTHA%20DIAMONDS,%20I%20would%20like%20to%20book%20a%20trade."
                                class="phone-link"
                                target="_blank"
                            >
                                <span>📱</span> +91 8904611111 (INDIA)
                            </a>
                            <a
                                href="https://wa.me/977?text=Hello%20SHRESTHA%20DIAMONDS,%20I%20would%20like%20to%20book%20a%20trade."
                                class="phone-link"
                                target="_blank"
                            >
                                <span>📱</span> +977 ------------ (NEPAL)
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <div class="container">
                <p>&copy; 2025 SHRESTHA DIAMONDS. All rights reserved.</p>
            </div>
        </footer>

        <script src="assets/js/main.js"></script>
    </body>
</html>
